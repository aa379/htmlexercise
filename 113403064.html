<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 500px;
        }

        table, th, td {
            border: 1px solid black;
        }

        th, td {
            padding: 5px; 
            text-align: left;
        }
        th {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <th>Name</th>
            <th>Student ID</th>
        </tr>
        <tr>
            <td>施駿朋</td>
            <td>113403064</td>
        </tr>
    </table>

</body>
</html>
